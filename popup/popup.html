<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LoopMail</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="duration-setting">
      <label for="durationSelect">Preview duration</label>
      <select id="durationSelect">
        <option value="5">5 seconds</option>
        <option value="10" selected>10 seconds</option>
        <option value="15">15 seconds</option>
        <option value="20">20 seconds</option>
        <option value="30">30 seconds</option>
        <option value="60">60 seconds</option>
      </select>
    </div>

    <div class="account-actions" id="accountActions">
      <a href="#" class="link" id="signInLink">Sign in / create account</a>
    </div>
    <div class="account-actions" id="manageActions" style="display: none;">
      <a href="#" class="link" id="manageAccountLink">Manage account</a>
      <a href="https://myaccount.google.com/" target="_blank" rel="noopener" class="link">Manage Gmail account</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
