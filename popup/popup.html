<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LoopMail</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="duration-setting">
      <label for="durationSelect">Preview duration</label>
      <select id="durationSelect">
        <option value="5">5 seconds</option>
        <option value="10" selected>10 seconds</option>
        <option value="15">15 seconds</option>
        <option value="20">20 seconds</option>
        <option value="30">30 seconds</option>
        <option value="60">60 seconds</option>
      </select>
    </div>

    <div class="account-actions">
      <div class="signed-in-as" id="signedInAs" style="display: none;"></div>
      <a href="#" class="link" id="manageAccountsLink">Manage accounts</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
