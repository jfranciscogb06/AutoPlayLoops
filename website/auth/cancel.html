<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoopMail — Checkout cancelled</title>
  <link rel="icon" type="image/png" href="../assets/icon128.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      color: #e5e5e5;
      padding: 24px;
      text-align: center;
    }
    h1 { font-size: 24px; margin: 0 0 12px; font-weight: 600; }
    p { color: #9ca3af; margin: 0 0 24px; line-height: 1.5; }
    .btn {
      display: inline-block;
      background: #d4a853;
      color: #0f0f0f;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }
    .btn:hover { background: #e0b85c; }
    .icon { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.9; }
  </style>
</head>
<body>
  <img src="../assets/icon128.png" alt="" class="icon" width="64" height="64">
  <h1>Checkout cancelled</h1>
  <p>Your payment was not completed. You can try again when you sign in to LoopMail.</p>
  <a href="https://mail.google.com/" class="btn" target="_blank" rel="noopener">Open Gmail</a>
</body>
</html>
